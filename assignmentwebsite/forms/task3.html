<!doctype html>
<html>
  <head>
    <title>Registration Form</title>
  </head>
  <body>
    <h2>Registration Form</h2>

    <form>
      First Name :
      <input type="text" placeholder="Enter First Name" /><br /><br />

      Last Name :
      <input type="text" placeholder="Enter Last Name" /><br /><br />

      Email :
      <input type="email" placeholder="Enter Email Address" /><br /><br />

      Password :
      <input type="password" /><br /><br />

      Gender :<br />
      Male <input type="radio" name="gender" /><br />
      Female <input type="radio" name="gender" /><br />
      Other <input type="radio" name="gender" /><br /><br />
      Age :
      <input type="number" /><br /><br />

      Preferences :<br />
      Acrylic Painting <input type="checkbox" /><br />
      Oil Painting <input type="checkbox" /><br />
      Water Color Painting <input type="checkbox" /><br /><br />

      Select Occupation :
      <select>
        <option>Student</option>
        <option>Teacher</option>
        <option>Employee</option></select
      ><br /><br />

      Bio :<br />
      <textarea
        rows="5"
        cols="40"
        placeholder="Share few lines about yourself..."
      ></textarea
      ><br /><br />

      <input type="reset" value="RESET" />
      <input type="submit" value="SUBMIT" />
    </form>
  </body>

  <a href="subIndex.html">⬅ Back to Category</a>
<br>
<a href="../index.html">🏠 Back to Home</a>
</html>
