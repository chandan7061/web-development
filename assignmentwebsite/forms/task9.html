<!doctype html>
<html>
  <head>
    <title>Task 9 - Pizza Order Form</title>
  </head>
  <body>
    <h2>Pizza Order Form</h2>

    <form>
      <table border="1" cellpadding="10">
        <tr>
          <td>First Name:</td>
          <td><input type="text" /></td>
        </tr>

        <tr>
          <td>Last Name:</td>
          <td><input type="text" /></td>
        </tr>

        <tr>
          <td>Email Address:</td>
          <td><input type="email" /></td>
        </tr>

        <tr>
          <td>Contact Number:</td>
          <td><input type="text" /></td>
        </tr>

        <tr>
          <td>Preferred Delivery Date:</td>
          <td><input type="date" /></td>
        </tr>

        <tr>
          <td>Size:</td>
          <td>
            <input type="radio" name="size" /> Small
            <input type="radio" name="size" /> Medium
            <input type="radio" name="size" /> Large
          </td>
        </tr>

        <tr>
          <td>Flavor:</td>
          <td>
            <input type="checkbox" /> Hawaiian (Php 150.00)
            <input type="number" value="1" min="1" max="10" /><br /><br />

            <input type="checkbox" /> Pepperoni (Php 140.00)
            <input type="number" value="1" min="1" max="10" /><br /><br />

            <input type="checkbox" /> Vegetable (Php 130.00)
            <input type="number" value="1" min="1" max="10" />
          </td>
        </tr>

        <tr>
          <td>Credit Card Number:</td>
          <td><input type="text" /></td>
        </tr>

        <tr>
          <td>PIN:</td>
          <td><input type="password" /></td>
        </tr>

        <tr>
          <td>Additional Note:</td>
          <td><textarea rows="4" cols="30"></textarea></td>
        </tr>

        <tr>
          <td colspan="2">
            <input type="submit" value="Submit Order" />
          </td>
        </tr>
      </table>
    </form>
  </body>

  <a href="subIndex.html">⬅ Back to Category</a>
<br>
<a href="../index.html">🏠 Back to Home</a>
</html>
