<!doctype html>
<html>
  <head>
    <title>Task 12 - Doctor Appointment Form</title>
  </head>
  <body>
    <h2>Doctor Appointment Form</h2>
    <hr />

    <form>
      <table cellpadding="10">
        <tr>
          <td>
            <img src="doctor.jpg" width="300" height="400" />
          </td>

          <td>
            Appointment Date:
            <input type="date" /><br /><br />

            Appointment Time:
            <input type="time" /><br /><br />

            Name:
            <input type="text" placeholder="First" />
            <input type="text" placeholder="Last" /><br /><br />

            Gender:
            <input type="radio" name="gender" /> Male
            <input type="radio" name="gender" /> Female<br /><br />

            Phone:
            <input type="text" /><br /><br />

            Address:
            <input type="text" placeholder="city" />
            <input type="text" placeholder="state" /><br /><br />

            Your Query:<br />
            <textarea rows="4" cols="30"></textarea><br /><br />

            Appointment Type:<br />
            <input type="checkbox" /> Cervix checkup<br />
            <input type="checkbox" /> Heart checkup<br />
            <input type="checkbox" /> Eye check-up<br />
            <input type="checkbox" /> Hearing Test<br /><br />

            <input type="submit" value="Send" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
