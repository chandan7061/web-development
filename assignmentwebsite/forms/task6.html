<!doctype html>
<html>
  <head>
    <title>Task 6 - Registration Form</title>
  </head>
  <body>
    <h2>Registration Form : Dance Club</h2>
    <hr />

    <form>
      <table border="1" cellpadding="5" width="600">
        <tr>
          <td>Name:</td>
          <td><input type="text" size="50" /></td>
        </tr>

        <tr>
          <td>IC No:</td>
          <td>
            <input type="text" size="5" /> - <input type="text" size="5" /> -
            <input type="text" size="5" />
          </td>
        </tr>

        <tr>
          <td>Address:</td>
          <td><textarea rows="4" cols="50"></textarea></td>
        </tr>

        <tr>
          <td>Gender:</td>
          <td>
            <input type="radio" name="gender" /> Male
            <input type="radio" name="gender" /> Female
          </td>
        </tr>

        <tr>
          <td>Dance Type:</td>
          <td>
            <input type="checkbox" /> Zapin <input type="checkbox" /> Joget
            <input type="checkbox" /> Inang <input type="checkbox" /> Lion Dance
          </td>
        </tr>

        <tr>
          <td>Competition:</td>
          <td>
            <select size="3">
              <option>State Level</option>
              <option>National Level</option>
              <option>State/International Level</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Nationality:</td>
          <td>
            <select>
              <option>-please select-</option>
              <option>Indian</option>
              <option>Other</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Password:</td>
          <td><input type="password" /></td>
        </tr>

        <tr>
          <td colspan="2">
            <input type="submit" value="Register Me" />
            <input type="reset" value="Cancel" />
          </td>
        </tr>
      </table>
    </form>
  </body>

  <a href="subIndex.html">⬅ Back to Category</a>
<br>
<a href="../index.html">🏠 Back to Home</a>
</html>
