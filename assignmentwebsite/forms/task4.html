<!doctype html>
<html>
  <head>
    <title>Task 4 - Application Form</title>
  </head>
  <body>
    <h1>Application Form</h1>

    <form>
      First Name:
      <input type="text" />

      Last Name:
      <input type="text" />
      <br /><br />

      Date of Birth:
      <input type="date" />

      Age:
      <input type="number" />
      <br /><br />

      Gender:
      <select>
        <option>Male</option>
        <option>Female</option>
      </select>

      Email Address:
      <input type="email" placeholder="Enter email address" />
      <br /><br />

      Positions Available:
      <input type="radio" name="pos" /> Junior Developer
      <input type="radio" name="pos" /> Mid-level Developer
      <input type="radio" name="pos" /> Senior Developer <br /><br />

      Programming Languages:
      <input type="checkbox" /> Java <input type="checkbox" /> JavaScript
      <input type="checkbox" /> Python <br /><br />

      Password:
      <input type="password" />

      Confirm Password:
      <input type="password" />
      <br /><br />

      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
  </body>
