<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bootstrap Color Changer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style2.css" />
  </head>

  <body
    class="bg-light d-flex justify-content-center align-items-center vh-100"
  >
    <div
      class="container border border-2 border-dark bg-white"
      style="max-width: 750px"
    >
      <div class="row">
        <div class="col-md-8 border-end border-2 border-dark p-4" id="card">
          <h1 id="heading" class="mb-4">This is a heading</h1>

          <p id="para" class="fs-5">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestiae,
            repellendus. Lorem ipsum dolor sit amet consectetur.
          </p>
        </div>

        <div class="col-md-4 p-4 d-flex flex-column gap-4">
          <div class="d-flex justify-content-between align-items-center">
            <label class="fw-bold"> Background Color </label>

            <input type="color" id="bgColor" />
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <label class="fw-bold"> Heading Color </label>

            <input type="color" id="headingColor" />
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <label class="fw-bold"> Paragraph Color </label>

            <input type="color" id="paraColor" />
          </div>

          <button class="btn btn-dark" onclick="resetAll()">RESET</button>
        </div>
      </div>
    </div>

    <script src="script2.js"></script>
  </body>
</html>
