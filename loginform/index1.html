<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Register</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-primary d-flex justify-content-center align-items-end vh-100 pb-5"
  >
    <div class="d-flex gap-5 align-items-end">
      <div class="bg-light p-4 rounded-4 shadow" style="width: 320px">
        <h4 class="fw-bold mb-4">
          <span class="border-bottom border-3 border-primary pb-1">Lo</span>gin
        </h4>

        <div class="d-flex align-items-center gap-2 border-bottom pb-2 mb-3">
          <i class="bi bi-envelope"></i>
          <input
            type="text"
            placeholder="Enter ur email"
            class="border-0 bg-light w-100"
          />
        </div>

        <div
          class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3"
        >
          <div class="d-flex align-items-center gap-2 w-100">
            <i class="bi bi-lock"></i>
            <input
              type="password"
              placeholder="Enter ur password"
              class="border-0 bg-light w-100"
            />
          </div>
          <i class="bi bi-eye"></i>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <input type="checkbox" />
            <span>RememberMe</span>
          </div>
          <span class="text-primary text-nowrap">Forgot Password</span>
        </div>

        <button
          class="bg-primary text-light border-0 w-100 p-2 rounded-2 fw-bold shadow"
        >
          Login now
        </button>

        <p class="text-center mt-3">
          Dont have account ?
          <span class="text-primary fw-bold">Signup now</span>
        </p>
      </div>

      <div class="bg-light p-4 rounded-4 shadow" style="width: 320px">
        <h4 class="fw-bold mb-4">
          <span class="border-bottom border-3 border-primary pb-1">Re</span
          >gister
        </h4>

        <div class="d-flex align-items-center gap-2 border-bottom pb-2 mb-3">
          <i class="bi bi-person"></i>
          <input
            type="text"
            placeholder="Enter ur name"
            class="border-0 bg-light w-100"
          />
        </div>

        <div class="d-flex align-items-center gap-2 border-bottom pb-2 mb-3">
          <i class="bi bi-envelope"></i>
          <input
            type="text"
            placeholder="Enter ur email"
            class="border-0 bg-light w-100"
          />
        </div>

        <div class="d-flex align-items-center gap-2 border-bottom pb-2 mb-3">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            placeholder="Create a password"
            class="border-0 bg-light w-100"
          />
        </div>

        <div
          class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3"
        >
          <div class="d-flex align-items-center gap-2 w-100">
            <i class="bi bi-lock"></i>
            <input
              type="password"
              placeholder="Confirm ur password"
              class="border-0 bg-light w-100"
            />
          </div>
          <i class="bi bi-eye"></i>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <input type="checkbox" />
            <span>I agree all Terms</span>
          </div>
          <span class="text-primary text-nowrap">Forgot Password</span>
        </div>

        <button
          class="bg-primary text-light border-0 w-100 p-2 rounded-2 fw-bold shadow"
        >
          Register now
        </button>

        <p class="text-center mt-3">
          Already have an account?
          <span class="text-primary fw-bold">Login now</span>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
