<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container p-5 mt-5">
      <div class="converter-card">
        <h1 class="title">
          <i class="bi bi-currency-exchange"></i>
          Currency Converter
        </h1>

        <div class="mb-4">
          <label class="form-label">Enter Amount</label>
          <input
            type="number"
            id="orgAmount"
            class="form-control"
            placeholder="Enter amount"
          />
          <small class="error" id="amountError"></small>
        </div>

        <div class="row align-items-center">
          <div class="col-md-5 mb-3">
            <div class="flag-box">
              <img id="flag1" src="" alt="flag" />
            </div>

            <label class="form-label">From</label>

            <select id="country1" class="form-select">
              <option value="">Select Country</option>
            </select>

            <small class="error" id="fromError"></small>
          </div>

          <div class="col-md-2 text-center mb-3">
            <button id="swapBtn" class="swap-btn">
              <i class="bi bi-arrow-left-right"></i>
            </button>
          </div>

          <div class="col-md-5 mb-3">
            <div class="flag-box">
              <img id="flag2" src="" alt="flag" />
            </div>

            <label class="form-label">To</label>

            <select id="country2" class="form-select">
              <option value="">Select Country</option>
            </select>

            <small class="error" id="toError"></small>
          </div>
        </div>

        <button id="convertBtn" class="btn convert-btn w-100">Convert</button>
        <div class="loading text-center mt-3 d-none" id="loading">
          <div class="spinner-border spinner-border-sm"></div>
          Converting...
        </div>

        <div class="result-box mt-4" id="resultBox">
          <h2 id="newAmount">0.00 INR</h2>
          <p id="rateText"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
