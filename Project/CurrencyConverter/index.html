<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Currency Converter</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- CSS -->

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-box">
      <h1 class="title">💸 Currency Converter</h1>

      <!-- Amount -->

      <div class="mb-4">
        <input
          type="number"
          id="orgAmount"
          class="form-control"
          placeholder="Enter Amount"
        />
      </div>

      <!-- Country Section -->

      <div class="row align-items-center">
        <!-- From -->

        <div class="col-md-5 text-center">
          <img
            src="https://flagsapi.com/US/flat/64.png"
            id="flag1"
            class="flag"
          />

          <select id="country1" class="form-select mt-2"></select>
        </div>

        <!-- Swap -->

        <div class="col-md-2 text-center my-3">
          <button id="swapBtn" class="swap-btn">
            <i class="bi bi-arrow-left-right"></i>
          </button>
        </div>

        <!-- To -->

        <div class="col-md-5 text-center">
          <img
            src="https://flagsapi.com/IN/flat/64.png"
            id="flag2"
            class="flag"
          />

          <select id="country2" class="form-select mt-2"></select>
        </div>
      </div>

      <!-- Button -->

      <button id="convertBtn" class="convert-btn mt-4">Convert</button>

      <!-- Loading -->

      <div id="loading" class="loading mt-3">
        <div class="spinner-border text-light"></div>
      </div>

      <!-- Result -->

      <div id="resultBox" class="result-box mt-4">
        <h2 id="newAmount">0.00 INR</h2>
        <p id="rateText"></p>
      </div>

      <!-- Error -->

      <p id="error" class="error-text"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
