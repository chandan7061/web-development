<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Password Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="bg-primary text-white text-center p-4 shadow">
      <h1 class="fw-bold">Password Manager</h1>

      <p class="mb-0">By Chandan Kumar</p>
    </header>

    <main>
      <div class="container mt-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <form id="passwordForm">
              <div class="row mb-4 align-items-center">
                <div class="col-md-3">
                  <label for="website" class="form-label fw-bold">
                    Website Name
                  </label>
                </div>

                <div class="col-md-9">
                  <input
                    type="text"
                    id="website"
                    class="form-control"
                    placeholder="Instagram"
                  />
                </div>
              </div>

              <div class="row mb-4 align-items-center">
                <div class="col-md-3">
                  <label for="username" class="form-label fw-bold">
                    Username
                  </label>
                </div>

                <div class="col-md-9">
                  <input
                    type="text"
                    id="username"
                    class="form-control"
                    placeholder="example@gmail.com"
                  />
                </div>
              </div>

              <div class="row mb-4 align-items-center">
                <div class="col-md-3">
                  <label for="password" class="form-label fw-bold">
                    Password
                  </label>
                </div>

                <div class="col-md-9">
                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter Password"
                  />
                </div>
              </div>

              <div class="text-center mt-5">
                <button type="submit" class="btn btn-primary px-5 py-2">
                  <i class="bi bi-plus-circle"></i>

                  Add
                </button>
              </div>

              <div class="text-center mt-3">
                <button
                  type="button"
                  id="downloadBtn"
                  class="btn btn-outline-primary px-5 py-2"
                >
                  <i class="bi bi-download"></i>

                  Download Data
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
