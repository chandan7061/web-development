<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="calculator">
      <div class="display" id="display">0</div>

      <div class="line"></div>
      <div class="buttons container-fluid">
        <div class="row mb-3">
          <div class="col-3 d-flex justify-content-center">
            <button class="btns">AC</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">C</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">%</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns operator">/</button>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-3 d-flex justify-content-center">
            <button class="btns">7</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">8</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">9</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns operator">*</button>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-3 d-flex justify-content-center">
            <button class="btns">4</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">5</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">6</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns operator">-</button>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-3 d-flex justify-content-center">
            <button class="btns">1</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">2</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">3</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns operator">+</button>
          </div>
        </div>
        <div class="row">
          <div class="col-3 d-flex justify-content-center">
            <button class="btns">0</button>
          </div>

          <div class="col-3 d-flex justify-content-center">
            <button class="btns">.</button>
          </div>

          <div class="col-6 d-flex justify-content-center">
            <button class="btns equal">=</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
