<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Guess The Number</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="w-25 bg-white rounded shadow border mx-auto mt-5 p-4">
      <h1 class="text-center mb-4">Guess The Number</h1>

      <form class="d-flex flex-column gap-3 align-items-center w-100 p-3">
        <h5>Enter a number from 1 to 10</h5>

        <input
          type="number"
          id="guessNumber"
          class="form-control"
          placeholder="Guess the number"
          min="1"
          max="10"
        />

        <button type="submit" class="btn btn-primary w-100">Submit</button>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
