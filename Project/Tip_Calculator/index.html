<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="w-25 bg-white rounded shadow border mx-auto mt-5 p-4">
      <!-- <h1 class="text-center mb-4">Tip Calculator</h1> -->
      <button class="btn btn-warning w-100">Tip Calculator</button>

      <form class="d-flex flex-column gap-3 align-items-center w-100 p-3">
        <h5>Bill Amount</h5>
        <input
          type="number"
          id="billAmount"
          class="form-control"
          placeholder="Enter bill amount"
        />

        <h5>How was the service?</h5>
        <select id="service" class="form-select">
          <option value="0.25">25% - Top Notch</option>
          <option value="0.20">20% - Excellent</option>
          <option value="0.15">15% - Good</option>
          <option value="0.10">10% - Bad</option>
          <option value="0.05">5% - Worst</option>
        </select>

        <h5>Total Number of People</h5>
        <input
          type="number"
          id="people"
          class="form-control"
          placeholder="Enter number of people"
        />

        <button type="submit" class="btn btn-info w-150">Calculate</button>
      </form>

      <div class="text-center fw-bold mt-3">
        Each Person Should Pay :
        <span id="result">₹0</span>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
