<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Coaching Institute Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light">
    <div class="container mt-5 mb-5">
      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
          <h2>Institute Registration Form</h2>
        </div>

        <div class="card-body">
          <form onsubmit="return validateForm();">
            <!-- Personal Information -->

            <h4 class="text-primary mb-3">Personal Information</h4>

            <div class="mb-3">
              <label class="form-label">Full Name</label>

              <input type="text" class="form-control" id="fullName" />

              <small class="text-danger" id="nameError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>

              <input type="text" class="form-control" id="email" />

              <small class="text-danger" id="emailError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Mobile Number</label>

              <input
                type="text"
                class="form-control"
                id="mobile"
                maxlength="10"
                oninput="
                  this.value = this.value.replace(/[^0-9]/g, '');

                  if (this.value.length == 1 && !/[6-9]/.test(this.value)) {
                    this.value = '';
                  }
                "
              />

              <small class="text-danger" id="mobileError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Date of Birth</label>

              <input type="date" class="form-control" id="dob" />

              <small class="text-danger" id="dobError"></small>
            </div>

            <!-- Academic Details -->

            <h4 class="text-primary mb-3">Academic Details</h4>

            <div class="mb-3">
              <label class="form-label"> Last Completed Qualification </label>

              <select class="form-select" id="qualification">
                <option value="">Select Qualification</option>

                <option>10th</option>
                <option>12th</option>
                <option>Graduate</option>
                <option>Postgraduate</option>
              </select>

              <small class="text-danger" id="qualificationError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label"> Percentage / Grade </label>

              <input
                type="text"
                class="form-control"
                id="percentage"
                maxlength="3"
                oninput="
                  this.value = this.value.toUpperCase();

                  if (!/^([0-9]{0,3}|[A-F])$/.test(this.value)) {
                    this.value = this.value.slice(0, -1);
                  }
                "
              />
              <small class="text-danger" id="percentageError"></small>
            </div>

            <!-- Course Information -->

            <h4 class="text-primary mb-3">Course Information</h4>

            <div class="mb-3">
              <label class="form-label"> Preferred Course </label>

              <select class="form-select" id="course">
                <option value="">Select Course</option>

                <option>IIT-JEE</option>
                <option>NEET</option>
                <option>Banking Exams</option>
                <option>UPSC</option>
              </select>

              <small class="text-danger" id="courseError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label"> Batch Timing Preference </label>

              <select class="form-select" id="batch">
                <option value="">Select Batch</option>

                <option>Morning</option>
                <option>Afternoon</option>
                <option>Evening</option>
                <option>Weekend</option>
              </select>

              <small class="text-danger" id="batchError"></small>
            </div>

            <!-- Address -->

            <h4 class="text-primary mb-3">Address</h4>

            <div class="mb-3">
              <label class="form-label"> Residential Address </label>

              <textarea class="form-control" id="address"></textarea>

              <small class="text-danger" id="addressError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">City</label>

              <input type="text" class="form-control" id="city" />

              <small class="text-danger" id="cityError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Pin Code</label>

              <input
                type="text"
                class="form-control"
                id="pincode"
                maxlength="6"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              />

              <small class="text-danger" id="pincodeError"></small>
            </div>

            <!-- Guardian Details -->

            <h4 class="text-primary mb-3">Guardian Details</h4>

            <div class="mb-3">
              <label class="form-label"> Guardian Full Name </label>

              <input type="text" class="form-control" id="guardian" />

              <small class="text-danger" id="guardianError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label"> Guardian Contact Number </label>

              <input
                type="text"
                class="form-control"
                id="guardianMobile"
                maxlength="10"
                oninput="
                  this.value = this.value.replace(/[^0-9]/g, '');

                  if (this.value.length == 1 && !/[6-9]/.test(this.value)) {
                    this.value = '';
                  }
                "
              />

              <small class="text-danger" id="guardianMobileError"></small>
            </div>

            <!-- Additional Information -->

            <h4 class="text-primary mb-3">Additional Information</h4>

            <div class="mb-3">
              <label class="form-label"> How did you hear about us? </label>

              <select class="form-select" id="hear">
                <option value="">Select Option</option>

                <option>Friends</option>
                <option>Online Ad</option>
                <option>Newspaper</option>
                <option>Social Media</option>
                <option>Other</option>
              </select>

              <small class="text-danger" id="hearError"></small>
            </div>

            <div class="mb-3">
              <label class="form-label"> Special Requirements </label>

              <textarea class="form-control"></textarea>
            </div>

            <button class="btn btn-primary w-100">Register Now</button>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
