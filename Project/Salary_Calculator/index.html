<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Salary Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0 rounded-4 p-4">
            <h1 class="text-center mb-4">Salary Calculator</h1>

            <form id="salaryForm" class="d-flex flex-column gap-3">
              <div>
                <label class="form-label fw-bold"> Enter Basic Salary </label>

                <input
                  type="number"
                  id="basicSalary"
                  class="form-control"
                  placeholder="Enter basic salary"
                />

                <small id="error" class="text-danger"></small>
              </div>

              <div class="d-flex gap-3">
                <button
                  type="submit"
                  id="calculateBtn"
                  class="btn btn-primary w-100"
                >
                  <span id="btnText"> Calculate Gross Salary </span>

                  <span
                    id="spinner"
                    class="spinner-border spinner-border-sm d-none"
                  ></span>
                </button>

                <button
                  type="button"
                  id="resetBtn"
                  class="btn btn-danger w-100"
                >
                  Reset
                </button>
              </div>
            </form>

            <div id="successMsg" class="alert alert-success mt-3 d-none">
              Salary Calculated Successfully!
            </div>

            <!-- Result Card -->

            <div id="resultCard" class="card mt-4 p-3 d-none">
              <div class="salary-row">
                <span>Basic Salary</span>
                <span id="basicResult"></span>
              </div>

              <div class="salary-row">
                <span>HRA</span>
                <span id="hraResult"></span>
              </div>

              <div class="salary-row">
                <span>DA</span>
                <span id="daResult"></span>
              </div>

              <hr />

              <div class="salary-row gross">
                <span>Gross Salary</span>
                <span id="grossResult"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
