<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Travel Bill Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0 rounded-4 p-4">
            <h1 class="text-center mb-4">Travel Bill Calculator</h1>

            <form id="travelForm" class="d-flex flex-column gap-3">
              <div>
                <label class="form-label fw-bold">
                  Enter Kilometers Covered
                </label>

                <input
                  type="number"
                  id="km"
                  class="form-control"
                  placeholder="Enter kilometers"
                  step="0.1"
                />

                <small id="error" class="text-danger"></small>
              </div>

              <button type="submit" class="btn btn-primary">
                Calculate Bill
              </button>
            </form>

            <!-- Result Card -->

            <div id="resultCard" class="card mt-4 p-3 d-none">
              <h3 class="text-center mb-4">
                Total Bill :
                <span id="totalBill"></span>
              </h3>

              <div class="bill-row">
                <span>First 10 KM</span>
                <span id="slab1"></span>
              </div>

              <div class="bill-row">
                <span>Next 40 KM</span>
                <span id="slab2"></span>
              </div>

              <div class="bill-row">
                <span>Above 50 KM</span>
                <span id="slab3"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
