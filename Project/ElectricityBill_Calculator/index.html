<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Electricity Bill Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0 rounded-4 p-4">
            <h1 class="text-center mb-4">Electricity Bill Calculator</h1>

            <form id="billForm" class="d-flex flex-column gap-3">
              <div>
                <label class="form-label fw-bold">
                  Enter Electricity Units
                </label>

                <input
                  type="number"
                  id="units"
                  class="form-control"
                  placeholder="Enter units"
                  min="0"
                />
              </div>

              <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary w-100">
                  Calculate
                </button>

                <button
                  type="button"
                  id="resetBtn"
                  class="btn btn-danger w-100"
                >
                  Reset
                </button>
              </div>
            </form>

            <!-- Result Card -->

            <div id="resultCard" class="card mt-4 p-3 d-none">
              <h4 class="mb-3 text-center">Bill Details</h4>

              <div class="bill-row">
                <span>First 50 Units</span>
                <span id="slab1"></span>
              </div>

              <div class="bill-row">
                <span>51 - 200 Units</span>
                <span id="slab2"></span>
              </div>

              <div class="bill-row">
                <span>201 - 450 Units</span>
                <span id="slab3"></span>
              </div>

              <div class="bill-row">
                <span>Above 450 Units</span>
                <span id="slab4"></span>
              </div>

              <hr />

              <div class="bill-row fw-bold">
                <span>Subtotal</span>
                <span id="subtotal"></span>
              </div>

              <div class="bill-row fw-bold text-danger">
                <span>20% Surcharge</span>
                <span id="surcharge"></span>
              </div>

              <div class="bill-row grand-total">
                <span>Grand Total</span>
                <span id="grandTotal"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
